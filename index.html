<!DOCTYPE html><html lang="vi"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Trắc Nghiệm Công Nghệ 9 | Optimized by Dex</title>    <style>        /* Toàn bộ hệ thống dùng font đen như yêu cầu */        :root {            --text-color: #000000;            --glass-bg: rgba(255, 255, 255, 0.7);            --glass-border: rgba(255, 255, 255, 0.5);            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);            --primary: #2563eb;            --success: #16a34a;            --danger: #dc2626;        }        * {            box-sizing: border-box;            margin: 0;            padding: 0;            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            color: var(--text-color);            transition: all 0.3s ease;        }        body {            min-height: 100vh;            display: flex;            justify-content: center;            align-items: center;            overflow-x: hidden;            position: relative;            background-size: cover;            background-attachment: fixed;        }        /* Gradient Themes */        body.light-theme {            background: linear-gradient(135deg, #00f2fe 0%, #fee140 100%);        }        body.dark-theme {            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);        }        /* 2D Grid Tween Animation */        .grid-bg {            position: fixed;            top: -50%;            left: -50%;            width: 200%;            height: 200%;            background-image:                 linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),                linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px);            background-size: 40px 40px;            animation: gridMove 15s linear infinite;            z-index: -1;            will-change: transform;        }                body.dark-theme .grid-bg {            background-image:                 linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);        }        @keyframes gridMove {            0% { transform: translate(0, 0); }            100% { transform: translate(40px, 40px); }        }        /* Glassmorphism Panel */        .glass-panel {            background: var(--glass-bg);            backdrop-filter: blur(16px);            -webkit-backdrop-filter: blur(16px);            border: 1px solid var(--glass-border);            box-shadow: var(--glass-shadow);            border-radius: 24px;            padding: 30px;            width: 95%;            position: relative;            display: flex;            flex-direction: column;            max-height: 95vh;            overflow-y: auto;        }        /* Window Sizes */        .size-normal { max-width: 800px; }        .size-large { max-width: 1200px; }        .size-fullscreen {             max-width: 100%;             width: 100%;             height: 100vh;             max-height: 100vh;             border-radius: 0;             border: none;        }        /* Theme Toggle */        .theme-toggle {            position: absolute;            top: 20px;            right: 20px;            background: var(--glass-bg);            border: 1px solid #000;            padding: 8px 16px;            border-radius: 20px;            cursor: pointer;            font-weight: bold;            z-index: 10;        }        .theme-toggle:hover { background: rgba(0,0,0,0.1); }        /* Screens */        .screen { display: none; width: 100%; }        .screen.active { display: block; animation: fadeIn 0.5s ease; }        @keyframes fadeIn {            from { opacity: 0; transform: translateY(10px); }            to { opacity: 1; transform: translateY(0); }        }        /* Start Screen */        .setup-section {            margin-bottom: 20px;            padding: 15px;            background: rgba(255,255,255,0.5);            border-radius: 12px;            border: 1px solid rgba(0,0,0,0.1);        }        h1, h2 { text-align: center; margin-bottom: 20px; font-weight: 800; }                .radio-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }        .radio-group label {            display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 600;        }        .btn {            background: transparent;            border: 2px solid #000;            padding: 12px 24px;            border-radius: 12px;            font-size: 16px;            font-weight: bold;            cursor: pointer;            display: block;            margin: 20px auto 0;        }        .btn:hover { background: #000; color: #fff; }        .btn-start { font-size: 20px; padding: 15px 40px; }        /* Quiz Screen */        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold;}                .progress-container {            width: 100%; height: 10px; background: rgba(0,0,0,0.1);            border-radius: 5px; margin-bottom: 20px; overflow: hidden;        }        .progress-bar {            height: 100%; background: #000; width: 0%; transition: width 0.4s ease;        }        .question-box { font-size: 18px; font-weight: 600; margin-bottom: 20px; }                .options { display: flex; flex-direction: column; gap: 12px; }        .option {            background: rgba(255,255,255,0.6);            border: 2px solid rgba(0,0,0,0.2);            padding: 15px;            border-radius: 12px;            cursor: pointer;            font-weight: 500;            display: flex;            align-items: center;        }        .option:hover:not(.disabled) { border-color: #000; background: rgba(0,0,0,0.05); }        .option.selected { border-color: #000; background: rgba(0,0,0,0.1); font-weight: bold; }                /* Review states */        .option.correct { border-color: var(--success); background: rgba(22, 163, 74, 0.2); }        .option.wrong { border-color: var(--danger); background: rgba(220, 38, 38, 0.2); }        .option.disabled { cursor: not-allowed; }        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; }        /* Result Screen */        .result-container { text-align: center; }        .circular-progress {            position: relative;            height: 200px; width: 200px;            border-radius: 50%;            background: conic-gradient(#000 0deg, rgba(0,0,0,0.1) 0deg);            display: flex; align-items: center; justify-content: center;            margin: 0 auto 30px;        }        .circular-progress::before {            content: "";            position: absolute;            height: 160px; width: 160px;            border-radius: 50%;            background: #fff;            opacity: 0.8;        }        .progress-value { position: relative; font-size: 40px; font-weight: 800; }        /* Notification Popup */        .popup {            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);            background: rgba(255,255,255,0.9);            backdrop-filter: blur(10px); border: 2px solid #000;            padding: 15px 40px 15px 20px; border-radius: 12px;            box-shadow: 0 10px 30px rgba(0,0,0,0.2);            display: flex; align-items: center; gap: 10px;            z-index: 1000; transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);            font-weight: bold;        }        .popup.show { bottom: 30px; }        .popup .close-btn {            position: absolute; top: 5px; right: 10px;            cursor: pointer; font-size: 16px; font-weight: bold;        }        .icon-check { color: var(--success); font-size: 20px; }        .icon-cross { color: var(--danger); font-size: 20px; }        .footer-sig { text-align: center; margin-top: 20px; font-size: 12px; font-weight: 600; opacity: 0.7; }    </style></head><body class="light-theme">    <div class="grid-bg"></div>    <button class="theme-toggle" onclick="toggleTheme()">Sáng / Tối</button>    <div class="glass-panel size-normal" id="mainPanel">                <div id="startScreen" class="screen active">            <h1>HỆ THỐNG TRẮC NGHIỆM</h1>            <h2>CÔNG NGHỆ 9 - HK2</h2>                        <div class="setup-section">                <h3 style="margin-bottom: 10px; text-align: center;">Tùy chỉnh Giao diện</h3>                <div class="radio-group">                    <label><input type="radio" name="winSize" value="size-normal" checked> Normal</label>                    <label><input type="radio" name="winSize" value="size-large"> Large</label>                    <label><input type="radio" name="winSize" value="size-fullscreen"> Full-Screen</label>                </div>            </div>                        <div class="setup-section">                <h3 style="margin-bottom: 10px; text-align: center;">Tùy chọn Bài làm</h3>                <div class="radio-group">                    <label><input type="checkbox" id="shuffleCheck" checked> Đảo vị trí câu hỏi</label>                </div>            </div>            <button class="btn btn-start" onclick="startSystem()">BẮT ĐẦU (15 Phút)</button>            <div class="footer-sig">Vnix Hub by Dexeloper</div>        </div>        <div id="quizScreen" class="screen">            <div class="header-info">                <span id="questionCounter">Câu: 1/28</span>                <span id="timer">Thời gian: 15:00</span>            </div>            <div class="progress-container">                <div class="progress-bar" id="progressBar"></div>            </div>            <div class="question-box" id="questionText">Loading...</div>            <div class="options" id="optionsContainer"></div>                        <div class="nav-buttons">                <button class="btn" id="btnPrev" onclick="navQuestion(-1)">Quay lại</button>                <button class="btn" id="btnNext" onclick="navQuestion(1)">Tiếp theo</button>                <button class="btn" id="btnSubmit" onclick="submitQuiz()" style="display:none; background: #000; color: #fff;">Nộp Bài</button>            </div>            <div id="reviewActions" style="display:none; margin-top: 15px; text-align: center;">                <button class="btn" onclick="resetSystem()">Làm lại bài</button>            </div>            <div class="footer-sig">Optimized by Dex</div>        </div>        <div id="resultScreen" class="screen">            <h1>KẾT QUẢ BÀI LÀM</h1>            <div class="result-container">                <div class="circular-progress" id="circularProgress">                    <span class="progress-value" id="scoreText">0%</span>                </div>                <h2 id="correctCountText" style="margin-bottom: 20px;">Đúng: 0/28</h2>                <div style="display: flex; gap: 15px; justify-content: center;">                    <button class="btn" onclick="startReview()">Review Bài Làm</button>                    <button class="btn" onclick="resetSystem()">Làm lại bài</button>                </div>            </div>            <div class="footer-sig">Vnix Hub by Dexeloper</div>        </div>    </div>    <div class="popup" id="reviewPopup">        <span class="close-btn" onclick="closePopup()">x</span>        <span id="popupIcon"></span>        <span id="popupText">Nội dung thông báo</span>    </div>    <script>        const rawData = [            { q: "Câu 1: Tên gọi khác của thịt thăn là", o: ["A. Thịt nạc vai.", "B. Thịt ba rọi.", "C. Thịt ba chỉ.", "D. Thịt nạc thăn."], a: 3 },            { q: "Câu 2: Chất khoáng Iodine thường có nhiều trong thực phẩm:", o: ["A. Thịt bò, rau mồng tơi", "B. Rau dền, tôm.", "C. Cua, ghẹ, nghêu, sò, hến.", "D. Rau bắp cải, cá mực."], a: 2 },            { q: "Câu 3: Công việc chính của đầu bếp trưởng là", o: ["A. Nhận đơn hàng và phục vụ.", "B. Bảo quản, phân loại thực phẩm.", "C. Lập kế hoạch, phát triển công thức nấu ăn và thực đơn.", "D. Trộn, nghiền, tách thực phẩm."], a: 2 },            { q: "Câu 4: Trang bị bảo hộ cần thiết để đảm bảo an toàn lao động chế biến thực phẩm?", o: ["A. Tạp dề, khẩu trang, mũ đội che tóc,...", "B. Nguyên liệu, khẩu trang, tạp dề,...", "C. Khay làm bánh, nhà bếp, tạp dề,...", "D. Tạp dề, găng tay, bồn rửa,..."], a: 0 },            { q: "Câu 5: Để thực hiện tốt công việc của một thợ chế biến cần phát triển năng lực:", o: ["A. Kĩ năng chế biến các loại thực phẩm.", "B. Kĩ năng vận hành máy móc.", "C. Kĩ năng quản lí đầu bếp.", "D. Kĩ năng giám sát máy."], a: 0 },            { q: "Câu 6: Lưu ý khi sử dụng dụng cụ, thiết bị làm từ nhựa?", o: ["A. Dùng đựng thức ăn đang sôi.", "B. Hạn chế chất tẩy rửa mạnh hoặc vật gây xước.", "C. Đặt gần bếp lửa.", "D. Không cần kiểm tra đồ nhựa."], a: 1 },            { q: "Câu 7: Yêu cầu khi sử dụng dụng cụ sắc nhọn trong nhà bếp:", o: ["A. Không sử dụng dụng cụ bị hư hỏng.", "B. Bố trí hợp lí, thuận tiện, để xa tầm tay trẻ em.", "C. Để gần tầm tay trẻ em.", "D. Để ở những nơi thông thoáng."], a: 1 },            { q: "Câu 8: Lưu ý khi sử dụng và bảo quản thiết bị dùng gas là", o: ["A. Đặt bình gas gần nguồn nhiệt.", "B. Sử dụng trong phòng kín.", "C. Khóa van gas sau khi sử dụng.", "D. Để bình gas nằm ngang."], a: 2 },            { q: "Câu 9: Thành phần nào trong rau xanh giúp cải thiện táo bón?", o: ["A. Lipid", "B. Chất xơ", "C. Protein", "D. Vitamin"], a: 1 },            { q: "Câu 10: 1kg bắp cải 30.000đ. Chi phí mua 0,5kg bắp cải là?", o: ["A. 12.000 đồng.", "B. 15.000 đồng.", "C. 20.000 đồng.", "D. 25.000 đồng."], a: 1 },            { q: "Câu 11: Vai trò của vitamin A đối với cơ thể?", o: ["A. Tham gia quá trình oxy hóa.", "B. Kích thích ăn uống, phát triển thần kinh.", "C. Tăng cường cốt hóa xương.", "D. Phát triển, tái tạo tế bào da, niêm mạc, tăng miễn dịch."], a: 3 },            { q: "Câu 12: Chất khoáng sắt thường có trong thực phẩm nào?", o: ["A. Rau lá màu xanh đậm.", "B. Muối, gia vị.", "C. Các loại thịt, hải sản, lòng đỏ trứng, rau cải.", "D. Gan, thịt động vật bốn chân và trứng."], a: 0 },            { q: "Câu 13: Thiếu Iodine có thể dẫn đến nguy cơ mắc bệnh:", o: ["A. Buồn nôn, tiêu chảy.", "B. Suy giáp - bệnh bướu cổ.", "C. Da đậm màu, đau khớp.", "D. Khát nước, tăng huyết áp."], a: 1 },            { q: "Câu 14: Đặc điểm của thịt lợn tươi ngon?", o: ["A. Màu trắng, săn chắc.", "B. Màu hồng, thịt nhão.", "C. Có màu hồng, săn chắc, da mỏng, không có mùi ôi thiu/kháng sinh.", "D. Màu hồng, săn chắc, da mỏng."], a: 2 },            { q: "Câu 15: Tên gọi khác của thịt ba chỉ là:", o: ["A. Thịt nạc vai.", "B. Thịt thăn.", "C. Thịt ba rọi.", "D. Thịt mông."], a: 2 },            { q: "Câu 16: Nhiệt độ nguy hiểm khiến vi khuẩn phát triển nhanh nhất là:", o: ["A. 0°C đến 37°C.", "B. Dưới 0°C.", "C. Trên 100°C.", "D. 70°C đến 80°C."], a: 0 },            { q: "Câu 17: Một số ngành nghề liên quan đến chế biến thực phẩm là", o: ["A. Thợ chế biến, thợ cơ khí...", "B. Thợ chế biến thực phẩm, thợ vận hành máy, đầu bếp trưởng, người chuẩn bị đồ ăn nhanh...", "C. Thợ chế biến, tiếp viên hàng không...", "D. Thợ chế biến, giáo viên, lập trình viên..."], a: 1 },            { q: "Câu 18: Nội dung không đúng về công việc người chuẩn bị đồ ăn nhanh?", o: ["A. Chuẩn bị món ăn đơn giản.", "B. Rửa, thái, đong trộn.", "C. Sử dụng thiết bị nấu ăn.", "D. Giám sát máy móc giết mổ động vật, cắt thịt..."], a: 3 },            { q: "Câu 19: Tại sao không nên phơi đồ nhựa trực tiếp dưới nắng?", o: ["A. Nhanh bị móp méo.", "B. Nhanh bị giòn, vỡ, gãy.", "C. Không gây tác hại.", "D. Dễ mốc, mọt."], a: 1 },            { q: "Câu 20: Cách sử dụng dụng cụ, thiết bị làm từ gỗ?", o: ["A. Không đun nấu nhiệt độ quá cao.", "B. Hạn chế va đập.", "C. Tránh tiếp xúc trực tiếp với lửa hoặc nguồn nhiệt độ quá cao.", "D. Phơi trực tiếp dưới nắng."], a: 2 },            { q: "Câu 21: Biện pháp phòng tránh ngộ độc do vi sinh vật?", o: ["A. Đeo khẩu trang đi ngủ.", "B. Ăn tiết canh.", "C. Rửa tay bằng xà phòng trước khi chế biến.", "D. Sử dụng thực phẩm hết hạn."], a: 2 },            { q: "Câu 22: Bỏ bữa sáng thiếu thành phần cung cấp năng lượng tức thời nào?", o: ["A. Protein", "B. Lipid", "C. Carbohydrate (Chất bột đường)", "D. Vitamin"], a: 2 },            { q: "Câu 23: 0,5kg bí đỏ giá 10.000đ. Chi phí mua 1kg là?", o: ["A. 15.000 đồng.", "B. 20.000 đồng", "C. 25.000 đồng.", "D. 30.000 đồng"], a: 1 },            { q: "Câu 24: Vai trò của vitamin C đối với cơ thể?", o: ["A. Tái tạo tế bào da.", "B. Kích thích hệ xương.", "C. Phát triển thần kinh.", "D. Chống oxy hóa, kích thích liền sẹo, dự phòng tim mạch."], a: 3 },            { q: "Câu 25: Vitamin A thường có trong thực phẩm nào?", o: ["A. Sữa, gan, lòng đỏ trứng, bơ, phô mai.", "B. Ngũ cốc, rau quả.", "C. Chanh, cam, bưởi...", "D. Hải sản."], a: 0 },            { q: "Câu 26: Thiếu vitamin A nguy cơ mắc bệnh:", o: ["A. Thiếu máu.", "B. Còi xương.", "C. Quáng gà, khô mắt.", "D. Bướu cổ."], a: 2 },            { q: "Câu 27: Đặc điểm gạo tẻ ngon:", o: ["A. Ít rạn nứt.", "B. Màu hơi trắng đục, thân hạt hơi dài, hình bầu dục.", "C. Hạt tròn, trắng đục.", "D. Không nát, thơm."], a: 1 },            { q: "Câu 28: Phòng bệnh còi xương trẻ em cần bổ sung:", o: ["A. Vitamin A", "B. Vitamin C", "C. Vitamin B1", "D. Vitamin D"], a: 3 }        ];        let questions = [];        let userAnswers = [];        let currentIdx = 0;        let timerInt;        let timeLeft = 900; // 15 mins        let isReviewMode = false;        let popupTimeout;        function toggleTheme() {            const body = document.body;            if (body.classList.contains('light-theme')) {                body.classList.replace('light-theme', 'dark-theme');            } else {                body.classList.replace('dark-theme', 'light-theme');            }        }        function switchScreen(screenId) {            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));            document.getElementById(screenId).classList.add('active');        }        function startSystem() {            // Setup Window Size            const size = document.querySelector('input[name="winSize"]:checked').value;            const panel = document.getElementById('mainPanel');            panel.className = `glass-panel ${size}`;            // Prepare Data            questions = JSON.parse(JSON.stringify(rawData));            if (document.getElementById('shuffleCheck').checked) {                questions.sort(() => Math.random() - 0.5);            }            userAnswers = new Array(questions.length).fill(null);            currentIdx = 0;            timeLeft = 900;            isReviewMode = false;            document.getElementById('reviewActions').style.display = 'none';            switchScreen('quizScreen');            renderQuestion();            startTimer();        }        function startTimer() {            clearInterval(timerInt);            timerInt = setInterval(() => {                timeLeft--;                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');                let s = (timeLeft % 60).toString().padStart(2, '0');                document.getElementById('timer').innerText = `Thời gian: ${m}:${s}`;                if (timeLeft <= 0) submitQuiz();            }, 1000);        }        function updateProgress() {            let answered = userAnswers.filter(a => a !== null).length;            // Tiến trình dựa trên số câu đã đi qua / đã làm            let prog = (answered / questions.length) * 100;            document.getElementById('progressBar').style.width = `${prog}%`;        }        function renderQuestion() {            const qData = questions[currentIdx];            document.getElementById('questionCounter').innerText = `Câu: ${currentIdx + 1}/${questions.length}`;            document.getElementById('questionText').innerText = qData.q;                        const optsContainer = document.getElementById('optionsContainer');            optsContainer.innerHTML = '';            qData.o.forEach((optText, index) => {                const optDiv = document.createElement('div');                optDiv.className = 'option';                optDiv.innerText = optText;                                if (userAnswers[currentIdx] === index) {                    optDiv.classList.add('selected');                }                if (isReviewMode) {                    optDiv.classList.add('disabled');                    if (index === qData.a) {                        optDiv.classList.add('correct');                    } else if (userAnswers[currentIdx] === index && index !== qData.a) {                        optDiv.classList.add('wrong');                    }                } else {                    optDiv.onclick = () => selectOption(index);                }                optsContainer.appendChild(optDiv);            });            // Buttons visibility            document.getElementById('btnPrev').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';                        if (currentIdx === questions.length - 1) {                document.getElementById('btnNext').style.display = 'none';                if(!isReviewMode) document.getElementById('btnSubmit').style.display = 'block';            } else {                document.getElementById('btnNext').style.display = 'block';                document.getElementById('btnSubmit').style.display = 'none';            }            if(isReviewMode) showReviewPopup(qData);        }        function selectOption(index) {            if (isReviewMode) return;            userAnswers[currentIdx] = index;            updateProgress();            renderQuestion();        }        function navQuestion(dir) {            currentIdx += dir;            renderQuestion();            if(!isReviewMode) updateProgress();        }        function submitQuiz() {            clearInterval(timerInt);            let correctCount = 0;            userAnswers.forEach((ans, i) => {                if (ans === questions[i].a) correctCount++;            });            let percent = Math.round((correctCount / questions.length) * 100);                        document.getElementById('scoreText').innerText = `${percent}%`;            document.getElementById('correctCountText').innerText = `Đúng: ${correctCount}/${questions.length}`;                        let circ = document.getElementById('circularProgress');            circ.style.background = `conic-gradient(#000 ${percent * 3.6}deg, rgba(0,0,0,0.1) 0deg)`;            switchScreen('resultScreen');        }        function startReview() {            isReviewMode = true;            currentIdx = 0;            document.getElementById('timer').innerText = "Chế độ Review";            document.getElementById('reviewActions').style.display = 'block';            document.getElementById('btnSubmit').style.display = 'none';            switchScreen('quizScreen');            renderQuestion();            updateProgress(); // Cập nhật full thanh tiến trình        }        function showReviewPopup(qData) {            clearTimeout(popupTimeout);            const popup = document.getElementById('reviewPopup');            const icon = document.getElementById('popupIcon');            const text = document.getElementById('popupText');                        let userAns = userAnswers[currentIdx];                        if (userAns === null) {                icon.innerHTML = '<span class="icon-cross">✗</span>';                text.innerText = "Bạn đã bỏ trống câu này.";            } else if (userAns === qData.a) {                icon.innerHTML = '<span class="icon-check">✓</span>';                text.innerText = "Chính xác! Bạn đã chọn đúng.";            } else {                icon.innerHTML = '<span class="icon-cross">✗</span>';                text.innerText = "Sai rồi! Đáp án đúng là mục được tô màu xanh.";            }            popup.classList.add('show');            popupTimeout = setTimeout(() => {                popup.classList.remove('show');            }, 10000);        }        function closePopup() {            document.getElementById('reviewPopup').classList.remove('show');        }        function resetSystem() {            closePopup();            switchScreen('startScreen');        }    </script></body></html>
